apiVersion: v1
kind: Service
metadata:
  name: {{ include "kronos.fullname" . }}-backend
  namespace: kronos
  labels:
    {{- include "kronos.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "kronos.backend.selectorLabels" . | nindent 4 }}
