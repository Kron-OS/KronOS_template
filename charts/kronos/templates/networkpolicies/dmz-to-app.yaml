{{- if .Values.networkPolicies.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "kronos.fullname" . }}-dmz-to-app
  namespace: kronos
  labels:
    {{- include "kronos.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/zone: app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/zone: dmz
      ports:
        - protocol: TCP
          port: 8000
{{- end }}
