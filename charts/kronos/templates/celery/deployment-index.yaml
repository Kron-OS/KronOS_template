apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kronos.fullname" . }}-celery-index
  namespace: kronos
  labels:
    {{- include "kronos.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-index
spec:
  replicas: {{ .Values.celery.workers.index.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "kronos.name" . }}-celery-index
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "kronos.name" . }}-celery-index
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: celery-index
        app.kubernetes.io/zone: app
      annotations:
        {{- include "kronos.vaultAnnotations" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kronos.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: celery-index
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - celery
            - -A
            - src.external.celery_app
            - worker
            - -Q
            - {{ .Values.celery.workers.index.queues | quote }}
            - -c
            - {{ .Values.celery.workers.index.concurrency | quote }}
            - --loglevel=info
          env:
            {{- include "kronos.commonEnv" . | nindent 12 }}
          envFrom:
            - secretRef:
                name: kronos-app-secrets
          resources:
            {{- toYaml .Values.resources.celeryIndex | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
