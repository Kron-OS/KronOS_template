apiVersion: v2
name: kronos
description: KronOS — Forensically sound, multi-tenant evidence management and forensic timeline analysis platform
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - forensics
  - evidence
  - dfir
  - security
home: https://github.com/Kron-OS/KronOS_template
maintainers:
  - name: KronOS Team
dependencies:
  - name: postgresql
    version: ">=15.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: ">=18.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
