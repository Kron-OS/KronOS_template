version: "3.9"
# Production configuration — requires external secrets management
# Set KRONOS_DB_PASSWORD, KRONOS_MINIO_SECRET, etc. via environment or Docker secrets

services:
  vault:
    image: hashicorp/vault:1.17
    cap_add: [IPC_LOCK]
    # WARNING: -dev mode is in-memory, auto-unsealed and root-token only.
    # It is NOT suitable for production: the transit 'kronos-evidence' master key
    # is lost on restart, making previously-encrypted evidence undecryptable.
    # Production MUST run a sealed Vault server with persistent storage backend.
    # See docs/access-management-review.md [M-2].
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN:-changeme}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports: ["8200:8200"]
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  kes:
    image: minio/kes:latest
    depends_on:
      vault: { condition: service_healthy }
    volumes:
      - ./kes/config.yaml:/etc/kes/config.yaml:ro
      - ./certs:/certs:ro
    command: server --config /etc/kes/config.yaml

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kronos
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets: [db_password]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kronos}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_KEY:-}
    volumes:
      - minio_data:/data

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - cluster.name=kronos-prod
      - node.name=kronos-node-1
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
    volumes:
      - opensearch_data:/usr/share/opensearch/data
      - ./opensearch/opensearch.yml:/usr/share/opensearch/config/opensearch.yml:ro

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/kronos
      KC_DB_USERNAME: kronos
      KC_DB_PASSWORD: ${KRONOS_DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-keycloak.kronos.example}
      KC_HTTPS_CERTIFICATE_FILE: /certs/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /certs/keycloak.key
      KC_FEATURES: organization,token-exchange,fgap-v2
    volumes:
      - ./certs:/certs:ro

  clamav:
    image: clamav/clamav:stable
    ports: ["3310:3310"]
    volumes:
      - clamav_db:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1g

  tsa:
    image: freetsa/freetsa:latest
    ports: ["318:318"]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - kronos-backend

  kronos-backend:
    image: ghcr.io/${GITHUB_REPOSITORY:-kron-os/kronos}/backend:${IMAGE_TAG:-latest}
    # NOTE: Every var below maps to a required field in src/config.py (Settings).
    # Settings() has no defaults for these — a missing/renamed var crashes boot.
    # SECURITY TODO (see docs/access-management-review.md):
    #   - MINIO_ACCESS_KEY/SECRET_KEY must be a *scoped service account*, not root.
    #   - tusd must use a separate put-only service account, not the backend's.
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD}@postgres:5432/kronos
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # MINIO_ENDPOINT is host:port only — startup.py prepends the scheme from MINIO_USE_TLS.
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_TLS: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      OPENSEARCH_URL: http://opensearch:9200
      # Non-superuser service account (a superuser bypasses OpenSearch DLS).
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME:-kronos_backend}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD}
      # KEYCLOAK_URL = internal URL used to fetch JWKS; KEYCLOAK_PUBLIC_URL = issuer in the token.
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: https://${KEYCLOAK_HOSTNAME}
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      CLAMD_HOST: clamav
      CLAMD_PORT: "3310"
      TSA_URL: http://tsa:318
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      # Shared step-up ticket store — required because this service runs 2
      # replicas (audit M-4). The app bootstrap passes
      # build_step_up_ticket_store(settings) into create_app().
      STEP_UP_TICKET_STORE: redis
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512m
      restart_policy:
        condition: on-failure
        max_attempts: 3

  celery-worker:
    image: ghcr.io/${GITHUB_REPOSITORY:-kron-os/kronos}/backend:${IMAGE_TAG:-latest}
    # celery_app.py instantiates Settings() at import — the same required
    # fields as the backend must be present or the worker crashes on boot.
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD}@postgres:5432/kronos
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_USE_TLS: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: ${OPENSEARCH_USERNAME:-kronos_backend}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD}
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: https://${KEYCLOAK_HOSTNAME}
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
    depends_on:
      - redis
      - postgres
    command: celery -A src.external.celery_app worker -Q q.parse.fast,q.index -c 4
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1g

secrets:
  db_password:
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  clamav_db:
