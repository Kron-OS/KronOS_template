services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kronos
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kronos_dev_password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kronos -d kronos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_dev_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports: ["5601:5601"]
    depends_on:
      opensearch: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_FEATURES: organization,token-exchange
    volumes:
      - ./keycloak/kronos-realm.json:/opt/keycloak/data/import/kronos-realm.json:ro
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav_dev_data:/var/lib/clamav
    ports: ["3310:3310"]
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  tusd:
    image: tusproject/tusd:latest
    command: >
      -port 1080
      -s3-bucket kronos-tus-uploads
      -s3-endpoint http://minio:9000
      -s3-prefix uploads/
      -s3-force-path-style
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-kronos_minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      AWS_REGION: us-east-1
    ports: ["1080:1080"]
    depends_on:
      minio: { condition: service_healthy }

  tsa:
    # freetsa/freetsa has no public Docker image; use a lightweight stub for dev
    image: python:3.12-alpine
    command: >
      python -c "
      from http.server import HTTPServer, BaseHTTPRequestHandler
      class H(BaseHTTPRequestHandler):
          def do_POST(self):
              self.send_response(200)
              self.send_header('Content-Type','application/timestamp-reply')
              self.end_headers()
          def log_message(self, *a): pass
      HTTPServer(('0.0.0.0', 318), H).serve_forever()
      "
    ports: ["318:318"]

  step-ca:
    image: smallstep/step-ca:latest
    volumes:
      - step_ca_data:/home/step
    environment:
      DOCKER_STEPCA_INIT_NAME: "KronOS Internal CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_PASSWORD: ${STEP_CA_PASSWORD:-step_ca_dev_password}
    ports: ["9443:9443"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost:9443/health 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5

  kronos-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../src:/app/src:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD:-kronos_dev_password}@postgres:5432/kronos
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      MINIO_USE_TLS: "false"
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      OPENSEARCH_DASHBOARDS_URL: http://opensearch-dashboards:5601
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-kronos-backend-secret}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TSA_URL: http://tsa:318/api/v1/timestamp
      CLAMD_HOST: clamav
      CLAMD_PORT: "3310"
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    command: uvicorn src.external.fastapi_app:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../src:/app/src:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD:-kronos_dev_password}@postgres:5432/kronos
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      MINIO_USE_TLS: "false"
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-kronos-backend-secret}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TSA_URL: http://tsa:318/api/v1/timestamp
    depends_on:
      - redis
      - postgres
      - minio
    command: celery -A src.external.celery_app worker -Q q.parse.fast,q.parse.plaso,q.index -c 4 --loglevel=info

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD:-kronos_dev_password}@postgres:5432/kronos
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      MINIO_USE_TLS: "false"
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-kronos-backend-secret}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TSA_URL: http://tsa:318/api/v1/timestamp
    depends_on:
      - redis
      - postgres
    command: celery -A src.external.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["80:80"]
    depends_on:
      - kronos-backend

volumes:
  postgres_dev_data:
  minio_dev_data:
  opensearch_dev_data:
  clamav_dev_data:
  step_ca_data:
