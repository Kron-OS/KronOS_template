services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kronos
      POSTGRES_USER: kronos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kronos_dev_password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports: ["5432:5432"]
    healthcheck:
      # -h 127.0.0.1 forces a TCP check: during first-time initdb the bootstrap
      # server listens only on the unix socket, so a socket-based pg_isready
      # reports healthy before :5432 accepts connections, and dependents
      # (backend/celery) then fail wiring with "Connect call failed ... 5432".
      # start_period covers first-init (initdb + bootstrap + restart, ~45s on a
      # fresh volume) during which the TCP check legitimately fails — without it
      # the retries are exhausted before the real server is ready.
      test: ["CMD-SHELL", "pg_isready -U kronos -d kronos -h 127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 90s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch_dev_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports: ["5601:5601"]
    depends_on:
      opensearch: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  keycloak:
    # 26.2 (not 26.0): the organization-id token claim (addOrganizationId) the
    # backend's _extract_tenant requires only lands in 26.1+. Keep in sync with prod.
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_DB: dev-mem
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_FEATURES: organization,token-exchange
      # Expose /health/* on the management port (9000). Without this the health
      # endpoints return 404 and the healthcheck below never passes.
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./keycloak/kronos-realm.json:/opt/keycloak/data/import/kronos-realm.json:ro
    ports: ["8080:8080"]
    healthcheck:
      # The Keycloak 26 image ships no curl/wget, and /health lives on the
      # management port 9000 (not 8080). Use bash's /dev/tcp (bash is present;
      # kc.sh is a bash script) to probe GET /health/ready and match "200 OK".
      test:
        - CMD
        - bash
        - -c
        - 'exec 3<>/dev/tcp/localhost/9000; printf "GET /health/ready HTTP/1.0\r\n\r\n" >&3; grep -q "200 OK" <&3'
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  # Creates the kronos-dev organization via the Admin REST API and links the
  # three dev users. The org is NOT in the realm import because Keycloak 26.2
  # cannot import an organizations block. Uses the shared provisioning script
  # (scripts/provision_keycloak_org.sh) so dev/prod/Helm stay in sync.
  keycloak-init:
    image: curlimages/curl:latest
    depends_on:
      keycloak: { condition: service_healthy }
    restart: "no"
    volumes:
      - ../scripts/provision_keycloak_org.sh:/provision_keycloak_org.sh:ro
    environment:
      KC_BASE: http://keycloak:8080
      KC_REALM: kronos
      KC_ADMIN_USER: admin
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      ORG_NAME: KronOS Dev
      ORG_ALIAS: kronos-dev
      ORG_DESCRIPTION: Default development organization
      ORG_DOMAIN: kronos.dev
      ORG_MEMBER_IDS: "10000000-0000-4000-8000-000000000001 10000000-0000-4000-8000-000000000002 10000000-0000-4000-8000-000000000003"
    entrypoint: ["sh", "/provision_keycloak_org.sh"]

  # Keycloak 26 realm import does not always link authenticator-config values
  # (the config map ends up empty, causing LoAUtil to log "level null"). This
  # one-shot job patches the level via the Admin REST API after the import is
  # complete, so step-up auth (acr=aal2) can write the claim to the token.
  keycloak-flow-config:
    image: python:3.12-alpine
    depends_on:
      keycloak: { condition: service_healthy }
      keycloak-init: { condition: service_completed_successfully }
    restart: "no"
    environment:
      KC_BASE: http://keycloak:8080
      KC_REALM: kronos
      KC_ADMIN_USER: admin
      KC_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command:
      - python
      - -c
      - |
        import json, os, sys, urllib.error, urllib.parse, urllib.request

        base = os.environ["KC_BASE"]
        realm = os.environ["KC_REALM"]
        user = os.environ["KC_ADMIN_USER"]
        pwd = os.environ["KC_ADMIN_PASSWORD"]

        # --- helpers ---
        token = None

        def api(method, path, body=None):
            data = json.dumps(body).encode() if body is not None else None
            req = urllib.request.Request(
                f"{base}/admin/realms/{realm}{path}",
                data=data,
                headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
                method=method,
            )
            with urllib.request.urlopen(req) as r:
                return r.status, (json.loads(r.read()) if r.length != 0 else None)

        # 1. Admin token
        data = urllib.parse.urlencode({
            "grant_type": "password", "client_id": "admin-cli",
            "username": user, "password": pwd,
        }).encode()
        with urllib.request.urlopen(f"{base}/realms/master/protocol/openid-connect/token", data) as r:
            token = json.loads(r.read())["access_token"]

        # 2. Find the browser-stepup flow
        _, flows = api("GET", "/authentication/flows")
        flow = next((f for f in flows if f.get("alias") == "browser-stepup"), None)
        if not flow:
            print("browser-stepup flow not found — realm import may have failed")
            sys.exit(1)

        # 3. Find the conditional-level-of-authentication execution (flat list
        # includes sub-flows). NB: the executions endpoint is keyed by the flow
        # ALIAS, not its UUID id — passing the id yields a 404.
        alias = urllib.parse.quote(flow["alias"], safe="")
        _, execs = api("GET", f"/authentication/flows/{alias}/executions")
        loa = next((e for e in execs if e.get("providerId") == "conditional-level-of-authentication"), None)
        if not loa:
            print("conditional-level-of-authentication execution not found")
            sys.exit(1)

        # 4. Patch or create the authenticator config
        cfg_id = loa.get("authenticatorConfig")
        target = {"level": "2", "max_auth_age": "0", "store-in-user-session": "false"}
        if cfg_id:
            _, cfg = api("GET", f"/authentication/config/{cfg_id}")
            cfg.setdefault("config", {}).update(target)
            status, _ = api("PUT", f"/authentication/config/{cfg_id}", cfg)
            print(f"LoA config updated (id={cfg_id}) → HTTP {status}")
        else:
            body = {"alias": "browser-stepup loa-2", "config": target}
            status, _ = api("POST", f"/authentication/executions/{loa['id']}/config", body)
            print(f"LoA config created for execution {loa['id']} → HTTP {status}")

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav_dev_data:/var/lib/clamav
    ports: ["3310:3310"]
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  tusd:
    image: tusproject/tusd:latest
    command: >
      -port 1080
      -s3-bucket kronos-tus-uploads
      -s3-endpoint http://minio:9000
      -s3-object-prefix uploads/
      -s3-disable-ssl
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-kronos_minio}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      AWS_REGION: us-east-1
    ports: ["1080:1080"]
    depends_on:
      minio: { condition: service_healthy }

  tsa:
    # freetsa/freetsa has no public Docker image; use a lightweight stub for dev
    image: python:3.12-alpine
    command:
      - python
      - -c
      - |
        from http.server import HTTPServer, BaseHTTPRequestHandler
        class H(BaseHTTPRequestHandler):
            def do_POST(self):
                self.send_response(200)
                self.send_header('Content-Type','application/timestamp-reply')
                self.end_headers()
            def log_message(self, *a): pass
        HTTPServer(('0.0.0.0', 318), H).serve_forever()
    ports: ["318:318"]

  step-ca:
    image: smallstep/step-ca:latest
    volumes:
      - step_ca_data:/home/step
    environment:
      DOCKER_STEPCA_INIT_NAME: "KronOS Internal CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_REMOTE_MANAGEMENT: "true"
      DOCKER_STEPCA_INIT_PASSWORD: ${STEP_CA_PASSWORD:-step_ca_dev_password}
    ports: ["9443:9443"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fk https://localhost:9443/health 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5

  kronos-backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../src:/app/src:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD:-kronos_dev_password}@postgres:5432/kronos
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      MINIO_USE_TLS: "false"
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      OPENSEARCH_DASHBOARDS_URL: http://opensearch-dashboards:5601
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-kronos-backend-secret}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TSA_URL: http://tsa:318/api/v1/timestamp
      CLAMD_HOST: clamav
      CLAMD_PORT: "3310"
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      opensearch: { condition: service_healthy }
    command: uvicorn src.external.fastapi_app:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../src:/app/src:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD:-kronos_dev_password}@postgres:5432/kronos
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      MINIO_USE_TLS: "false"
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-kronos-backend-secret}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TSA_URL: http://tsa:318/api/v1/timestamp
    # Gate on health: worker_init wiring (startup.py) connects to Postgres, so it
    # must not start while "the database system is starting up", otherwise
    # configure_dependencies() fails and beat tasks hit an unconfigured repo.
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      minio: { condition: service_healthy }
    command: celery -A src.external.celery_app worker -Q q.parse.fast,q.parse.plaso,q.index -c 4 --loglevel=info

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://kronos:${POSTGRES_PASSWORD:-kronos_dev_password}@postgres:5432/kronos
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-kronos_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-kronos_minio_dev_password}
      MINIO_USE_TLS: "false"
      OPENSEARCH_URL: http://opensearch:9200
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: kronos
      KEYCLOAK_CLIENT_ID: kronos-backend
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-kronos-backend-secret}
      VAULT_URL: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-root}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      TSA_URL: http://tsa:318/api/v1/timestamp
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    command: celery -A src.external.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports: ["80:80"]
    depends_on:
      - kronos-backend

volumes:
  postgres_dev_data:
  minio_dev_data:
  opensearch_dev_data:
  clamav_dev_data:
  step_ca_data:
