[SERVICE]
    Flush          5
    Daemon         Off
    Log_Level      info
    HTTP_Server    On
    HTTP_Listen    0.0.0.0
    HTTP_Port      2020
    storage.type   filesystem
    storage.path   /var/log/flb-storage/

# -----------------------------------------------------------------------
# INPUTS
# -----------------------------------------------------------------------

# KronOS backend application logs (JSON structured)
[INPUT]
    Name           tail
    Tag            kronos.backend
    Path           /var/log/kronos/app.log
    Parser         json
    Mem_Buf_Limit  10MB
    Skip_Long_Lines On

# Celery task logs
[INPUT]
    Name           tail
    Tag            kronos.celery
    Path           /var/log/kronos/celery.log
    Parser         json
    Mem_Buf_Limit  5MB
    Skip_Long_Lines On

# Falco runtime alerts
[INPUT]
    Name           tail
    Tag            kronos.falco
    Path           /var/log/falco/falco.log
    Parser         json
    Mem_Buf_Limit  5MB
    Skip_Long_Lines On

# NGINX access log
[INPUT]
    Name           tail
    Tag            kronos.nginx
    Path           /var/log/nginx/access.log
    Parser         json
    Mem_Buf_Limit  10MB
    Skip_Long_Lines On

# -----------------------------------------------------------------------
# FILTERS
# -----------------------------------------------------------------------

# Add correlation metadata to all KronOS logs
[FILTER]
    Name           record_modifier
    Match          kronos.*
    Record         cluster   ${KRONOS_CLUSTER:-dev}
    Record         env       ${KRONOS_ENV:-development}

# Strip PII fields from backend logs before forwarding to SIEM
[FILTER]
    Name           record_modifier
    Match          kronos.backend
    Remove_key     password
    Remove_key     token
    Remove_key     refresh_token
    Remove_key     client_secret

# Parse audit events — extract event_type for Wazuh routing
[FILTER]
    Name           parser
    Match          kronos.backend
    Key_Name       message
    Parser         json
    Reserve_Data   On
    Preserve_Key   On

# -----------------------------------------------------------------------
# OUTPUTS
# -----------------------------------------------------------------------

# → OpenSearch: KronOS audit events (kronos-audit-* index)
[OUTPUT]
    Name                opensearch
    Match               kronos.backend
    Host                ${OPENSEARCH_HOST:-opensearch}
    Port                ${OPENSEARCH_PORT:-9200}
    HTTP_User           ${OPENSEARCH_USERNAME:-admin}
    HTTP_Passwd         ${OPENSEARCH_PASSWORD:-admin}
    Logstash_Format     On
    Logstash_Prefix     kronos-audit
    Logstash_DateFormat %Y.%m
    Suppress_Type_Name  On
    tls                 Off
    tls.verify          Off
    Retry_Limit         5
    Buffer_Size         False

# → OpenSearch: Falco alerts (wazuh-alerts-* index, picked up by Wazuh)
[OUTPUT]
    Name                opensearch
    Match               kronos.falco
    Host                ${OPENSEARCH_HOST:-opensearch}
    Port                ${OPENSEARCH_PORT:-9200}
    HTTP_User           ${OPENSEARCH_USERNAME:-admin}
    HTTP_Passwd         ${OPENSEARCH_PASSWORD:-admin}
    Logstash_Format     On
    Logstash_Prefix     wazuh-alerts
    Logstash_DateFormat %Y.%m
    Suppress_Type_Name  On
    tls                 Off
    tls.verify          Off
    Retry_Limit         5

# → Wazuh manager syslog input (UDP 514) for real-time SIEM correlation
[OUTPUT]
    Name           syslog
    Match          kronos.*
    Host           ${WAZUH_HOST:-wazuh-manager}
    Port           514
    Mode           udp
    Syslog_Format  rfc5424
    Syslog_Severity_Key  level
    Syslog_Appname_Key   service

# → stdout for local debugging (dev only)
[OUTPUT]
    Name           stdout
    Match          kronos.*
    Format         json_lines
