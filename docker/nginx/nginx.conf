upstream backend {
    server backend:8000;
    keepalive 32;
}

upstream opensearch_dashboards {
    server opensearch-dashboards:5601;
    keepalive 8;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Frontend SPA — serve from built static assets
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache immutable assets (Vite fingerprints them)
        location ~* \.(js|css|woff2|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Silent SSO iframe
    location = /silent-check-sso.html {
        root /usr/share/nginx/html;
        add_header X-Frame-Options ALLOWALL;
    }

    # Backend API
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Upload endpoints need longer timeout
        location /api/evidence/upload/ {
            limit_req zone=upload burst=10 nodelay;
            proxy_pass http://backend;
            proxy_read_timeout 300s;
            client_max_body_size 0;
        }
    }

    # SSE endpoint — must not buffer
    location /sse/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # Required for SSE over HTTP/1.1
        chunked_transfer_encoding on;
    }

    # OpenSearch Dashboards iframe embed
    location /dashboards/ {
        proxy_pass http://opensearch_dashboards/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Allow iframe from same origin only
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        proxy_hide_header X-Frame-Options;

        # CHIPS cookie rewrite for cross-site iframe (Partitioned)
        proxy_cookie_path / "/; Partitioned; SameSite=None; Secure";
    }

    # Health check (no auth)
    location = /healthz {
        proxy_pass http://backend/healthz;
        access_log off;
    }
}
