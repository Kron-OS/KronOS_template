upstream backend {
    # Must match the backend service/DNS name. In docker-compose the service is
    # "kronos-backend"; on Kubernetes set this to the backend Service name.
    server kronos-backend:8000;
    keepalive 32;
}

upstream opensearch_dashboards {
    server opensearch-dashboards:5601;
    keepalive 8;
}

# Rate limiting zones — applied per IP address
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=auth:10m   rate=10r/s;

# Body size defaults (override per-location as needed)
client_max_body_size 10m;

server {
    listen 80;
    server_name _;

    # -----------------------------------------------------------------------
    # Security headers — applied globally, overridden where needed
    # -----------------------------------------------------------------------
    # script-src deliberately omits 'unsafe-inline' (a Vite production build emits
    # no inline scripts); 'unsafe-inline' is kept only for style-src, which
    # Tailwind/runtime theming still requires.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; frame-src 'self'; frame-ancestors 'self'; connect-src 'self'; object-src 'none'"
        always;
    add_header X-Content-Type-Options        "nosniff"                            always;
    add_header X-Frame-Options               "SAMEORIGIN"                         always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy            "camera=(), microphone=(), geolocation=(), payment=()" always;
    # HSTS — 2-year max-age with preload (only effective over HTTPS; harmless on HTTP)
    add_header Strict-Transport-Security     "max-age=63072000; includeSubDomains; preload" always;

    # Gzip
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;

    # -----------------------------------------------------------------------
    # Frontend SPA — serve pre-built static assets
    # -----------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Immutable assets (Vite fingerprints filenames with content hash)
        location ~* \.(js|css|woff2|png|jpg|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Silent SSO iframe — keycloak-js uses this for session check; must be frameable
    # by the Keycloak origin.  We set a CSP frame-ancestors directive instead of
    # X-Frame-Options because "ALLOWALL" is not a valid RFC value and is ignored
    # by Chrome 89+.  X-Frame-Options is intentionally omitted here; the global
    # SAMEORIGIN header from the outer server block is not inherited for named
    # locations, so only the explicit CSP below applies.
    location = /silent-check-sso.html {
        root /usr/share/nginx/html;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
    }

    # -----------------------------------------------------------------------
    # Auth proxy — token refresh via HttpOnly cookie
    # -----------------------------------------------------------------------
    location /auth/ {
        limit_req zone=auth burst=20 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # -----------------------------------------------------------------------
    # Backend API
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;

        # Evidence upload — tighter rate limit, no body-size cap (streaming)
        location /api/evidence/upload/ {
            limit_req         zone=upload burst=10 nodelay;
            proxy_pass        http://backend;
            proxy_read_timeout 300s;
            client_max_body_size 0;
        }
    }

    # -----------------------------------------------------------------------
    # SSE endpoint — must NOT buffer (breaks server-sent events)
    # -----------------------------------------------------------------------
    location /api/sse/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # -----------------------------------------------------------------------
    # OpenSearch Dashboards iframe embed (Timeline tab)
    # -----------------------------------------------------------------------
    location /dashboards/ {
        proxy_pass         http://opensearch_dashboards/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";

        # Allow framing from same origin only (overrides global CSP frame-ancestors)
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        proxy_hide_header  X-Frame-Options;

        # Do NOT rewrite cookies from OpenSearch Dashboards — rewriting to
        # SameSite=None removes CSRF protection.  Dashboards should set its own
        # cookie attributes.  The iframe is same-origin via the /dashboards/ proxy.
    }

    # -----------------------------------------------------------------------
    # Health check — no auth, no rate limit, no access log
    # -----------------------------------------------------------------------
    location = /healthz {
        proxy_pass  http://backend/healthz;
        access_log  off;
    }
}

